server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API requests → backend container
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket support (for /api/ws/ routes)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        client_max_body_size 25M;
    }

    # Vite-built frontend assets — serve directly, never SPA-fallback.
    # Prevents /assets/shared.js (and other chunks) returning index.html as text/html.
    # ^~ stops Nginx from checking regex locations, which would otherwise override
    # this block and bypass the try_files $uri =404 directive.
    location ^~ /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # React SPA — serve index.html for all non-file routes.
    # World Monitor is now integrated into the main React app via React Router,
    # so /worldmonitor is handled by the SPA fallback — no separate Nginx config needed.
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
