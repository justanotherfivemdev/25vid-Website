server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API requests → backend container
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket support (for /api/ws/ routes)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        client_max_body_size 25M;
    }

    # Redirect no-trailing-slash path to the World Monitor SPA
    location = /worldmonitor {
        return 301 /worldmonitor/;
    }

    # World Monitor SPA — served from its own build output
    location /worldmonitor/ {
        try_files $uri $uri/ /worldmonitor/index.html;
    }

    # React SPA — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
