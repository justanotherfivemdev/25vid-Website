# 25th Infantry Division - Production Nginx Configuration

# Redirect www to non-www
server {
    listen 80;
    listen [::]:80;
    server_name www.yourdomain.com;
    return 301 https://yourdomain.com$request_uri;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;
    return 301 https://$server_name$request_uri;
}

# Main HTTPS server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com;

    # SSL Configuration (managed by Certbot or your SSL provider)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Root directory for React build
    root /opt/25th-id/frontend/build;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    # ── World Monitor external API proxies ─────────────────────────────────────
    # These routes serve the standalone World Monitor app.  Vite proxies them
    # during development; in production Nginx handles them.  They MUST appear
    # BEFORE the catch-all /api backend proxy below.

    # USGS Earthquake feed (public, no key required)
    location = /api/earthquakes {
        proxy_pass https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/4.5_day.geojson;
        proxy_ssl_server_name on;
        proxy_set_header Host earthquake.usgs.gov;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin *;
        proxy_cache_valid 200 5m;
    }

    # Polymarket prediction markets (public, no key required)
    location /api/polymarket {
        proxy_pass https://gamma-api.polymarket.com/markets;
        proxy_ssl_server_name on;
        proxy_set_header Host gamma-api.polymarket.com;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin *;
    }

    # CoinGecko crypto prices (public, no key required)
    location /api/coingecko {
        rewrite ^/api/coingecko(.*)$ /api/v3/simple/price$1 break;
        proxy_pass https://api.coingecko.com;
        proxy_ssl_server_name on;
        proxy_set_header Host api.coingecko.com;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin *;
    }

    # GDELT GEO 2.0 API — geolocation endpoint (public, no key required)
    location /api/gdelt-geo {
        rewrite ^/api/gdelt-geo(.*)$ /api/v2/geo/geo$1 break;
        proxy_pass https://api.gdeltproject.org;
        proxy_ssl_server_name on;
        proxy_set_header Host api.gdeltproject.org;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin *;
    }

    # GDELT DOC 2.0 API — document search endpoint (public, no key required)
    location /api/gdelt-doc {
        rewrite ^/api/gdelt-doc(.*)$ /api/v2/doc/doc$1 break;
        proxy_pass https://api.gdeltproject.org;
        proxy_ssl_server_name on;
        proxy_set_header Host api.gdeltproject.org;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin *;
    }

    # GDELT other endpoints
    location /api/gdelt {
        rewrite ^/api/gdelt(.*)$ $1 break;
        proxy_pass https://api.gdeltproject.org;
        proxy_ssl_server_name on;
        proxy_set_header Host api.gdeltproject.org;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin *;
    }

    # NGA Maritime Safety — navigation warnings (public)
    location /api/nga-warnings {
        rewrite ^/api/nga-warnings(.*)$ $1 break;
        proxy_pass https://msi.nga.mil;
        proxy_ssl_server_name on;
        proxy_set_header Host msi.nga.mil;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin *;
    }

    # PizzINT dashboard (public)
    location /api/pizzint {
        rewrite ^/api/pizzint(.*)$ /api$1 break;
        proxy_pass https://www.pizzint.watch;
        proxy_ssl_server_name on;
        proxy_set_header Host www.pizzint.watch;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin *;
    }

    # OpenSky Network — military aircraft tracking (public)
    location /api/opensky {
        rewrite ^/api/opensky(.*)$ $1 break;
        proxy_pass https://opensky-network.org/api;
        proxy_ssl_server_name on;
        proxy_set_header Host opensky-network.org;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin *;
    }

    # FAA NASSTATUS — airport delays (public)
    location /api/faa {
        rewrite ^/api/faa(.*)$ $1 break;
        proxy_pass https://nasstatus.faa.gov;
        proxy_ssl_server_name on;
        proxy_set_header Host nasstatus.faa.gov;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin *;
    }

    # Yahoo Finance chart data (public)
    location /api/yahoo-finance {
        # Expects ?symbol=SYMBOL query param; rewrites to Yahoo Finance chart API
        set $yf_symbol '';
        if ($arg_symbol) {
            set $yf_symbol $arg_symbol;
        }
        rewrite ^ /v8/finance/chart/$yf_symbol break;
        proxy_pass https://query1.finance.yahoo.com;
        proxy_ssl_server_name on;
        proxy_set_header Host query1.finance.yahoo.com;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin *;
    }

    # NOTE: Finnhub (/api/finnhub), FRED (/api/fred-data), Cloudflare
    # (/api/cloudflare-outages), and ACLED (/api/acled) require API keys.
    # These are proxied through the backend which injects keys server-side.
    # The rewrite rules below map World Monitor paths to backend endpoints.
    location = /api/rss-proxy {
        rewrite ^ /api/worldmonitor/rss-proxy break;
        proxy_pass http://localhost:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 20;
    }
    location = /api/finnhub {
        rewrite ^ /api/worldmonitor/finnhub break;
        proxy_pass http://localhost:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 15;
    }
    location = /api/fred-data {
        # FRED data is served by the backend worldmonitor routes
        rewrite ^ /api/worldmonitor/economic break;
        proxy_pass http://localhost:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /api/acled {
        rewrite ^ /api/worldmonitor/protests break;
        proxy_pass http://localhost:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /api/cloudflare-outages {
        # Cloudflare outages need CLOUDFLARE_API_TOKEN; graceful degradation
        # if not configured. Falls through to backend for handling.
        proxy_pass http://localhost:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    # See worldmonitor/.env.example for required keys.

    # Backend API proxy (catch-all — must come AFTER specific proxies above)
    location /api {
        proxy_pass http://localhost:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90;
    }

    # Static files with caching
    location /static/ {
        alias /opt/25th-id/frontend/build/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Redirect no-trailing-slash path to the World Monitor SPA
    location = /worldmonitor {
        return 301 /worldmonitor/;
    }

    # World Monitor SPA — served from its own build output
    # Deploy worldmonitor build: cd worldmonitor && npm run build
    # Then copy: cp -r dist/* /opt/25th-id/frontend/build/worldmonitor/
    location /worldmonitor/ {
        try_files $uri $uri/ /worldmonitor/index.html;
    }

    # Cache World Monitor hashed assets (Vite output)
    location /worldmonitor/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Error pages
    error_page 404 /index.html;
}
